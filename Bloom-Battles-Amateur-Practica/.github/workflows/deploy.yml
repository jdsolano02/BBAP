name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master # or main

jobs:
  build:
    runs-on: ubuntu-latest # You can change this to 'windows-latest' if needed

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "20.13.1" # Specify your Node.js version

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Build the app
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build # Adjust this if your build output is in a different folder
          publish_branch: gh-pages # The branch to which you'll deploy
